spring:
  config:
    import: optional:file:../phoenix-infra/.env[.properties]
  datasource:
    url: jdbc:postgresql://${PHOENIX_POSTGRES_HOST:localhost}:${PHOENIX_POSTGRES_PORT:${POSTGRES_PORT:5432}}/${POSTGRES_DB:phoenix}
    username: ${POSTGRES_USER:phoenix}
    password: ${POSTGRES_PASSWORD:}
  sql:
    init:
      mode: always
      schema-locations: classpath:db/schema/exercises.sql
      data-locations: classpath:db/seed/exercises.sql
